name: backend-tests

on:
  push:
    paths:
      - "friday-backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "friday-backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  unit-and-mocked-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: friday-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare test report directory
        run: mkdir -p test-results

      - name: Run deterministic unit tests
        env:
          CHECKPOINTER_BACKEND: memory
        run: pytest -q -m unit --junitxml=test-results/unit.xml --durations=20

      - name: Run mocked graph tests (no real LLM)
        env:
          CHECKPOINTER_BACKEND: memory
        run: pytest -q -m mocked_graph --junitxml=test-results/mocked-graph.xml --durations=20

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: friday-backend/test-results/
          if-no-files-found: warn
